services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY:-changez_moi_en_production}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - LOCAL_STORAGE_PATH=${LOCAL_STORAGE_PATH:-/app/storage}
      - CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost,http://localhost:3000}
      - PYTHONOPTIMIZE=2
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - media_data:/app/storage
    # Render Free Tier (512MB, 0.1 CPU): Single worker, limited concurrency
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1 --limit-concurrency 10 --timeout-keep-alive 30
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  media_data:
