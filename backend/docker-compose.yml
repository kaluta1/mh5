services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY:-changez_moi_en_production}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - LOCAL_STORAGE_PATH=${LOCAL_STORAGE_PATH:-/app/storage}
      - CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost,http://localhost:3000}
    volumes:
      - ./:/app
      - media_data:/app/storage
    command: python start.py --host 0.0.0.0 --port 8000 --no-reload
    networks:
      - myhigh5-network

  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=myhigh5
    ports:
      - "5432:5432"
    networks:
      - myhigh5-network

  redis:
    image: redis:6
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - myhigh5-network

volumes:
  postgres_data:
  redis_data:
  media_data:

networks:
  myhigh5-network:
    external: true
    name: myhigh5-network
