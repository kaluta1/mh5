services:
  - type: web
    name: mh5-backend
    env: python
    region: oregon  # Change to your preferred region
    plan: free  # or starter, standard, etc.
    buildCommand: pip install -r requirements.txt && alembic upgrade heads
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: SECRET_KEY
        sync: false  # Set manually - CRITICAL!
      - key: BACKEND_CORS_ORIGINS
        value: https://frontend-rho-eight-72.vercel.app
      - key: FRONTEND_URL
        value: https://frontend-rho-eight-72.vercel.app
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: STORAGE_TYPE
        value: s3
      - key: BSC_CHAIN_ID
        value: 56
      - key: BSC_USDT_DECIMALS
        value: 18
      - key: BSC_RPC_URL
        value: https://bsc-dataseed.binance.org

databases:
  - name: mh5-database
    databaseName: myhigh5
    user: myhigh5_user
    plan: free  # or starter, standard, etc.
    region: oregon  # Should match service region
